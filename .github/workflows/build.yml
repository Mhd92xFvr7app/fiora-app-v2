name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install Cordova
        run: npm install -g cordova
      - name: Create Cordova project
        run: |
          cordova create app com.fiora.app فيورا
          cp فيورا-final.html app/www/index.html
          cp logo_512x512.png app/www/logo_512x512.png
          cp config.xml app/config.xml
      - name: Add Android platform
        working-directory: app
        run: cordova platform add android
      - name: Copy icon to Android
        run: |
          for size in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p app/platforms/android/app/src/main/res/mipmap-$size
            cp logo_512x512.png app/platforms/android/app/src/main/res/mipmap-$size/ic_launcher.png
            cp logo_512x512.png app/platforms/android/app/src/main/res/mipmap-$size/ic_launcher_round.png
          done
      - name: Build APK
        working-directory: app
        run: cordova build android
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fiora-app
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
